<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWF Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3248; --border2:#3d4260;
  --text:#e8e9f0; --text2:#8b8fa8; --text3:#5a5d72;
  --amber:#f5a623; --teal:#2dd4bf; --red:#f87171; --green:#4ade80; --blue:#60a5fa;
  --font:'DM Mono',monospace; --sans:'DM Sans',system-ui,sans-serif; --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}
::-webkit-scrollbar{width:5px;} ::-webkit-scrollbar-track{background:var(--bg);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:30px;height:30px;background:var(--amber);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:13px;font-weight:500;color:#000;}
.logo-text{font-size:13px;color:var(--text2);}
.logo-text strong{display:block;color:var(--text);font-size:15px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.live-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--green);background:rgba(74,222,128,0.1);padding:4px 10px;border-radius:20px;border:1px solid rgba(74,222,128,0.2);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:var(--radius);cursor:pointer;font-size:12px;font-family:var(--sans);}
.refresh-btn:hover{border-color:var(--border2);color:var(--text);}
.nav-link{color:var(--text2);font-size:12px;text-decoration:none;padding:6px 12px;border-radius:var(--radius);}
.nav-link:hover{color:var(--text);background:var(--surface2);}

.main{padding:24px;max-width:1400px;margin:0 auto;}
.seam-note{font-size:11px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 14px;margin-bottom:20px;display:flex;align-items:center;gap:8px;}

.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.metric-label{font-size:11px;color:var(--text3);font-family:var(--font);letter-spacing:.05em;margin-bottom:6px;}
.metric-value{font-size:24px;font-weight:500;color:var(--text);font-family:var(--font);}
.metric-sub{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5;}
.up{color:var(--green);} .dn{color:var(--red);}

.chart-row{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.card-title{font-size:11px;color:var(--text3);font-family:var(--font);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px;}
.bottom-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}

.win-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;}
.win-card:hover{border-color:var(--border2);}
.win-big{font-size:36px;font-weight:500;color:var(--amber);font-family:var(--font);margin:8px 0 4px;}
.win-detail{display:none;margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.win-detail.open{display:block;}
.win-table{width:100%;border-collapse:collapse;font-size:11px;font-family:var(--font);}
.win-table th{color:var(--text3);font-weight:400;text-align:left;padding:4px;border-bottom:1px solid var(--border);}
.win-table td{padding:4px;border-bottom:1px solid var(--border);color:var(--text);}
.win-table tr:last-child td{border-bottom:none;}
.bar-bg{background:var(--surface2);border-radius:2px;height:4px;}
.bar-fill{height:4px;border-radius:2px;}

.wk-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.wk-label{color:var(--text3);width:32px;font-size:10px;font-family:var(--font);}
.wk-bar-wrap{flex:1;height:14px;background:var(--surface2);border-radius:2px;overflow:hidden;position:relative;}
.wk-bar{height:100%;border-radius:2px;position:absolute;top:0;left:0;}
.wk-val{width:46px;text-align:right;font-weight:500;font-size:10px;font-family:var(--font);}
.wk-yoy{width:34px;text-align:right;font-size:10px;}

.q-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.q-row:last-child{border-bottom:none;}
.q-cust{font-weight:500;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px;}
.q-amt{color:var(--text);font-family:var(--font);min-width:70px;text-align:right;}
.q-date{color:var(--text3);font-size:10px;font-family:var(--font);min-width:36px;text-align:right;margin-left:6px;}
.q-st{font-size:10px;padding:2px 7px;border-radius:10px;margin-left:6px;font-family:var(--font);}
.s-won{background:rgba(74,222,128,0.15);color:var(--green);}
.s-open{background:var(--surface2);color:var(--text3);}
.eleph{font-size:9px;color:var(--text3);margin-left:2px;}

.leg-row{display:flex;gap:14px;margin-bottom:12px;font-size:11px;color:var(--text2);align-items:center;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;}
.leg-sq{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.empty-state{color:var(--text3);font-size:12px;padding:16px 0;line-height:1.8;}
.error-msg{color:var(--red);font-size:12px;padding:8px 0;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">AW</div>
    <div class="logo-text"><strong>All Weld Fabrication</strong>Quote Dashboard</div>
  </div>
  <div class="topbar-right">
    <a href="https://quotes.allweldfab.com" class="nav-link">→ Quoting app</a>
    <a href="https://shopfloor.allweldfab.com" class="nav-link">→ Shop floor</a>
    <span class="live-badge"><span class="live-dot"></span>live</span>
    <button class="refresh-btn" onclick="loadLive()">↻ Refresh</button>
  </div>
</div>
</body></html>
